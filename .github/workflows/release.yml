name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: strip target/${{ matrix.target }}/release/gd

      - name: Strip binary (macOS)
        if: matrix.os == 'macos-latest'
        run: strip target/${{ matrix.target }}/release/gd

      - name: Create archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../gd-${{ github.ref_name }}-${{ matrix.target }}.tar.gz gd
          cd ../../..

      - name: Checksum (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: sha256sum gd-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > gd-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

      - name: Create archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/gd.exe -DestinationPath gd-${{ github.ref_name }}-${{ matrix.target }}.zip

      - name: Checksum (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 "gd-${{ github.ref_name }}-${{ matrix.target }}.zip").Hash.ToLower()
          "$hash  gd-${{ github.ref_name }}-${{ matrix.target }}.zip" | Out-File -Encoding ASCII "gd-${{ github.ref_name }}-${{ matrix.target }}.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: gd-${{ matrix.target }}
          path: gd-${{ github.ref_name }}-${{ matrix.target }}.*

  vscode-extension:
    name: Build VS Code Extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build extension
        working-directory: editors/vscode
        run: |
          npm install
          npm run compile
          npx @vscode/vsce package

      - uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: editors/vscode/*.vsix

  release:
    name: Create GitHub Release
    needs: [build, vscode-extension]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [ -f CHANGELOG.md ]; then
            NOTES=$(sed -n "/^## .*${VERSION}/,/^## /{/^## .*${VERSION}/d;/^## /d;p;}" CHANGELOG.md)
            if [ -n "$NOTES" ]; then
              {
                echo "body<<RELEASE_EOF"
                echo "$NOTES"
                echo "RELEASE_EOF"
              } >> "$GITHUB_OUTPUT"
              echo "has_notes=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_notes=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release (with changelog notes)
        if: steps.notes.outputs.has_notes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          files: artifacts/*

      - name: Create GitHub Release (auto-generated notes)
        if: steps.notes.outputs.has_notes != 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/*
